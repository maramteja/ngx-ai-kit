<div class="ngx-chat-widget" [style.height]="height">

  <!-- Header -->
  <div class="ngx-chat-header">
    <div class="ngx-chat-header__info">
      <span class="ngx-chat-header__dot"></span>
      <span class="ngx-chat-header__title">{{ title }}</span>
    </div>
    <button class="ngx-chat-header__clear" (click)="clearChat()" title="Clear chat">
      &#x21BA;
    </button>
  </div>

  <!-- Messages -->
  <div class="ngx-chat-messages">
    <div
      *ngFor="let msg of messages; trackBy: trackById"
      class="ngx-chat-message"
      [class.ngx-chat-message--user]="msg.role === 'user'"
      [class.ngx-chat-message--assistant]="msg.role === 'assistant'"
    >
      <div class="ngx-chat-bubble">
        <span *ngIf="!msg.isStreaming">{{ msg.content }}</span>
        <span *ngIf="msg.isStreaming">
          {{ msg.content }}<span class="ngx-chat-cursor"></span>
        </span>
      </div>
      <span class="ngx-chat-time">
        {{ msg.timestamp | date: 'HH:mm' }}
      </span>
    </div>
    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="ngx-chat-input-row">
    <textarea
      class="ngx-chat-input"
      [(ngModel)]="inputText"
      [placeholder]="placeholder"
      [disabled]="isLoading"
      (keydown)="handleKeydown($event)"
      rows="1"
    ></textarea>
    <button
      class="ngx-chat-send"
      [disabled]="isLoading || !inputText.trim()"
      (click)="sendMessage()"
      aria-label="Send message"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>
